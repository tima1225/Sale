<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TIA - Secure Enterprise Marketplace</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/brigends-king');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

        :root {
            --bg-main: #060709; --bg-card: #0d0f16; --text-main: #ffffff;
            --accent: #00d2ff; --accent-gradient: linear-gradient(135deg, #2f80ed 0%, #00d2ff 100%);
        }

        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; }
        
        /* ВАШ ДИЗАЙН ВОССТАНОВЛЕН */
        .brand { font-family: 'Brigends King', sans-serif; text-transform: uppercase; letter-spacing: 2px; font-size: 50px; text-align: center; margin: 40px 0; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-box { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-box { width: 100%; padding: 16px; margin: 10px 0; background: #151822; border: 1px solid #333; border-radius: 12px; color: white; font-family: 'Montserrat', sans-serif; }
        button { width: 100%; padding: 18px; background: var(--accent-gradient); border: none; border-radius: 12px; cursor: pointer; font-weight: 800; margin-top: 15px; font-family: 'Brigends King', sans-serif; color: #fff; text-transform: uppercase; }

        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body>

<!-- Экран Авторизации -->
<div id="scr-auth" class="screen active">
    <h1 class="brand">TIA</h1>
    <div class="card-box">
        <input type="text" id="login-id" class="input-box" placeholder="ВАШ ID (TIA-XXXXX)">
        <input type="password" id="login-pass" class="input-box" placeholder="ПАРОЛЬ">
        <button onclick="app.login()">ВОЙТИ В СИСТЕМУ</button>
        <button style="background:transparent; border: 1px solid #333; margin-top:10px;" onclick="app.showReg()">РЕГИСТРАЦИЯ</button>
    </div>
</div>

<!-- Экран Ленты (дизайн сохранен) -->
<div id="scr-main" class="screen">
    <h1 class="brand" style="font-size: 30px; margin-top: 20px;">ЛЕНТА ТОВАРОВ</h1>
    <div id="feed" class="card-box">Здесь будет ваш контент</div>
    <button onclick="app.logout()">ВЫХОД</button>
</div>

<script>
    window.app = {
        users: JSON.parse(localStorage.getItem('tia_users') || '{}'),

        login: function() {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            if(this.users[id] && this.users[id].pass === pass) {
                localStorage.setItem('session', id);
                this.go('scr-main');
            } else { alert("Ошибка: Неверные данные"); }
        },

        showReg: function() {
            const name = prompt("Ваше Имя:");
            const pass = prompt("Придумайте пароль:");
            if(name && pass) {
                const id = "TIA-" + Math.floor(Math.random()*90000+10000);
                this.users[id] = { name, pass };
                localStorage.setItem('tia_users', JSON.stringify(this.users));
                alert("Успешно! Ваш ID: " + id);
            }
        },

        go: function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        },

        logout: function() {
            localStorage.removeItem('session');
            location.reload();
        }
    };
</script>
</body>
</html>
