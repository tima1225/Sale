<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>China Express Cyberpunk Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Urbanist:wght@400;600;700;800&display=swap');
        
        * { 
            box-sizing: border-box; 
            font-family: 'Urbanist', 'Space Grotesk', sans-serif; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: #000000; 
            color: #ffffff; 
            padding: 24px 16px calc(100px + env(safe-area-inset-bottom)) 16px; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Премиум Шапка в стиле презентаций Apple */
        .header-premium { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 28px; 
            padding: 0 4px;
        }
        .header-premium h1 { 
            font-size: 26px; 
            font-weight: 800; 
            letter-spacing: -0.5px; 
            background: linear-gradient(135deg, #ffffff 30%, #a1a1a6 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .brand-badge {
            background: linear-gradient(90deg, #2f80ed, #00d2ff);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(47, 128, 237, 0.3);
        }
        
        /* Горизонтальный скролл категорий (POIZON Style) */
        .categories-slider { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            margin-bottom: 32px; 
            padding: 4px 0; 
        }
        .categories-slider::-webkit-scrollbar { display: none; }
        
        .cat-node { 
            display: flex; 
            align-items: center;
            gap: 10px;
            background: rgba(28, 28, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 18px;
            border-radius: 16px;
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .cat-node.active { 
            background: #ffffff;
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 255, 255, 0.12);
        }
        .cat-circle { 
            font-size: 20px;
            transition: transform 0.3s;
        }
        .cat-node.active .cat-circle { transform: scale(1.1); }
        .cat-node span { 
            font-size: 14px; 
            font-weight: 700; 
            color: #8e8e93; 
            letter-spacing: -0.2px;
        }
        .cat-node.active span { color: #000000; }

        /* Контейнер Сетки/Слайдера */
        .slider-section-container { width: 100%; overflow: hidden; }
        .slider-viewport { 
            width: 100%; 
            overflow-x: auto; 
            display: flex; 
            padding-bottom: 16px;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        .slider-viewport::-webkit-scrollbar { display: none; }
        .slider-track { display: flex; gap: 16px; }
        
        /* Карточка товара уровня Apple Store */
        .slide-card-elite { 
            scroll-snap-align: start;
            width: calc(100vw - 32px); 
            background: linear-gradient(145deg, rgba(20,20,22,0.9) 0%, rgba(10,10,11,0.9) 100%); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 32px; 
            padding: 16px; 
            position: relative; 
            display: flex; 
            flex-direction: column;
            backdrop-filter: blur(20px);
            transition: transform 0.3s;
        }
        
        .logistic-tag { 
            position: absolute; 
            top: 28px; 
            left: 28px; 
            padding: 6px 14px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            z-index: 2; 
            letter-spacing: 0.5px; 
            backdrop-filter: blur(10px);
        }
        .logistic-tag.stock { background: rgba(52,199,89,0.12); color: #30d158; border: 1px solid rgba(52,199,89,0.2); }
        .logistic-tag.china { background: rgba(255,159,10,0.12); color: #ff9f0a; border: 1px solid rgba(255,159,10,0.2); }
        
        .image-container { 
            width: 100%; 
            height: 290px; 
            background: #121214; 
            border-radius: 24px; 
            overflow: hidden; 
            margin-bottom: 20px; 
            position: relative;
        }
        .image-container::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
        }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .product-main-title { font-size: 22px; font-weight: 700; color: #ffffff; margin-bottom: 6px; letter-spacing: -0.5px; }
        .product-sizes-subtitle { font-size: 13px; color: #8e8e93; margin-bottom: 24px; font-weight: 600; }
        
        .footer-action-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding: 0 4px; }
        .price-zone { display: flex; flex-direction: column; }
        .old-price-line { font-size: 14px; color: #ff453a; text-decoration: line-through; margin-bottom: 2px; font-weight: 600; opacity: 0.8; }
        .current-price { font-size: 24px; font-weight: 800; color: #ffffff; letter-spacing: -0.5px; }
        
        /* Кнопка добавления */
        .action-circle-btn { 
            background: #ffffff; 
            color: #000000; 
            border: none; 
            width: 54px; 
            height: 54px; 
            border-radius: 18px; 
            font-size: 26px; 
            font-weight: 400; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .action-circle-btn:active { transform: scale(0.92) rotate(90deg); background: #f2f2f7; }

        /* Экраны */
        .app-screen { display: none; } 
        .app-screen.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Дизайн элементов Корзины */
        .cart-row-item { 
            display: flex; 
            gap: 16px; 
            background: rgba(28, 28, 30, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 16px; 
            border-radius: 24px; 
            margin-bottom: 14px; 
            align-items: center; 
        }
        .cart-row-img { width: 74px; height: 74px; background: #1c1c1e; border-radius: 16px; overflow: hidden; }
        .cart-row-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-row-info { flex: 1; } 
        .cart-row-info h4 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; } 
        .cart-row-info p { font-size: 13px; color: #8e8e93; margin-top: 4px; font-weight: 600; }
        .cart-row-price { font-size: 17px; font-weight: 700; color: #ffffff; margin-right: 4px; }
        .cart-row-delete { background: transparent; border: none; color: #ff453a; font-size: 20px; cursor: pointer; padding: 8px; transition: transform 0.2s; }
        .cart-row-delete:active { transform: scale(0.8); }

        /* Футуристичная Форма Оформления заказа */
        .form-premium-inputs { 
            background: linear-gradient(180deg, rgba(20,20,22,0.6) 0%, rgba(14,14,16,0.6) 100%); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 28px; 
            padding: 24px 20px; 
            margin-top: 28px; 
        }
        .form-premium-inputs h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; color: #8e8e93; letter-spacing: 1px; }
        .input-holder { position: relative; margin-bottom: 16px; }
        
        .input-holder input, .input-holder select { 
            width: 100%; 
            background: rgba(44, 44, 46, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 16px; 
            padding: 18px 20px; 
            color: #fff; 
            font-size: 15px; 
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
        }
        .input-holder input:focus, .input-holder select:focus {
            border-color: #ffffff;
            background: rgba(44, 44, 46, 0.7);
        }
        
        /* Тюнинг кастомного выпадающего списка */
        .input-holder select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 18px;
            padding-right: 48px;
        }

        .bill-total-row { display: flex; justify-content: space-between; align-items: center; padding: 28px 4px; font-size: 16px; font-weight: 700; }
        .bill-total-row span { letter-spacing: -0.2px; }
        
        /* Главная кнопка подтверждения (Apple Клик) */
        .btn-checkout-confirm { 
            width: 100%; 
            background: #ffffff; 
            color: #000000; 
            border: none; 
            padding: 20px; 
            border-radius: 18px; 
            font-weight: 700; 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .btn-checkout-confirm:active { transform: scale(0.96); opacity: 0.9; }

        /* Выезжающая iOS-шторка (Drawer) */
        .blur-overlay { position: fixed; top: 0; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .blur-overlay.open { opacity: 1; pointer-events: auto; }
        
        .drawer-sizes { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: #141416; 
            border-top: 1px solid rgba(255,255,255,0.08); 
            border-top-left-radius: 36px; 
            border-top-right-radius: 36px; 
            padding: 24px 20px calc(32px + env(safe-area-inset-bottom)) 20px; 
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
            z-index: 1000; 
        }
        .drawer-sizes.open { transform: translateY(0); }
        .drawer-bar { width: 44px; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; margin: -10px auto 24px auto; }
        .drawer-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .drawer-header-row h3 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        
        /* Сетка размеров */
        .sizes-scroll-row { display: flex; gap: 12px; margin: 16px 0 28px 0; overflow-x: auto; padding-bottom: 8px; }
        .sizes-scroll-row::-webkit-scrollbar { display: none; }
        .size-item-btn { 
            background: rgba(255,255,255,0.04); 
            border: 1px solid rgba(255,255,255,0.06); 
            padding: 16px 26px; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            color: #fff; 
            transition: all 0.2s; 
        }
        .size-item-btn.selected { 
            background: #ffffff; 
            color: #000000; 
            border-color: #ffffff; 
            box-shadow: 0 8px 20px rgba(255,255,255,0.2); 
            transform: scale(1.02);
        }

        /* Синематик Нижний Навбар (Glassmorphism) */
        .bottom-navbar-elite { 
            position: fixed; 
            bottom: 16px; left: 16px; right: 16px; 
            background: rgba(20, 20, 22, 0.6); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 28px;
            display: flex; 
            justify-content: space-around; 
            padding: 14px 0 calc(14px + env(safe-area-inset-bottom)); 
            z-index: 998; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        .tab-btn { background: transparent; border: none; color: #636366; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; position: relative; transition: color 0.3s; }
        .tab-btn.active { color: #ffffff; }
        .tab-icon { font-size: 22px; margin-bottom: 5px; transition: transform 0.3s; }
        .tab-btn.active .tab-icon { transform: translateY(-2px) scale(1.05); }
        .cart-badge-num { position: absolute; top: -4px; right: 8px; background: #ffffff; color: #000000; font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 9px; animation: pop 0.3s ease-out; }
        @keyframes pop { from { transform: scale(0.5); } to { transform: scale(1); } }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="screen-catalog" class="app-screen active">
        <div class="header-premium">
            <h1>CHINA EXPRESS</h1>
            <div class="brand-badge">POIZON LAB</div>
        </div>

        <div class="categories-slider">
            <div class="cat-node active" onclick="switchCategoryFilter('all', this)">
                <div class="cat-circle">🔥</div><span>Все</span>
            </div>
            <div class="cat-node" onclick="switchCategoryFilter('shoes', this)">
                <div class="cat-circle">👟</div><span>Обувь</span>
            </div>
            <div class="cat-node" onclick="switchCategoryFilter('clothes', this)">
                <div class="cat-circle">🧥</div><span>Одежда</span>
            </div>
            <div class="cat-node" onclick="switchCategoryFilter('accessories', this)">
                <div class="cat-circle">🧢</div><span>Аксессуары</span>
            </div>
        </div>

        <div class="slider-section-container">
            <div class="slider-viewport" id="sliderViewportContainer">
                <div class="slider-track" id="sliderItemsTrack"></div>
            </div>
        </div>
    </div>

    <div id="screen-cart" class="app-screen">
        <h2 style="font-size: 24px; margin-bottom: 24px; font-weight: 800; letter-spacing: -0.5px;">Корзина</h2>
        <div class="cart-stack" id="cartContainerStack"></div>
        
        <div class="form-premium-inputs" id="formContainerInputsBlock">
            <h3>Способ и адрес получения</h3>
            
            <div class="input-holder">
                <input type="text" id="inputFullname" placeholder="ФИО получателя полностью">
            </div>
            <div class="input-holder">
                <input type="tel" id="inputPhone" placeholder="Номер телефона для связи">
            </div>
            
            <div class="input-holder">
                <select id="selectDeliveryType" onchange="toggleAddressPlaceholder()">
                    <option value="cdek">Доставка до пункта СДЭК</option>
                    <option value="post">Почта России (Авиа / Наземная)</option>
                    <option value="yandex">Курьерская доставка Яндекс</option>
                    <option value="pickup">Самовывоз из шоурума</option>
                </select>
            </div>
            
            <div class="input-holder">
                <input type="text" id="inputAddress" placeholder="Укажите город и адрес отделения СДЭК">
            </div>
        </div>
        
        <div class="bill-total-row">
            <span style="color: #8e8e93; font-weight: 600;">ИТОГО К РАСЧЕТУ:</span>
            <span style="color: #30d158; font-size: 26px; font-weight: 800;" id="cartTotalSumText">0 ₽</span>
        </div>
        <button class="btn-checkout-confirm" onclick="sendOrderDataToTelegram()">Оформить и отправить</button>
    </div>

    <div class="blur-overlay" id="drawerBlurOverlay" onclick="closeDrawerSizes()"></div>
    <div class="drawer-sizes" id="drawerSizesPanel">
        <div class="drawer-bar"></div>
        <div class="drawer-header-row">
            <h3 id="drawerProductName">Выберите размер</h3>
            <div style="color: #636366; font-size: 22px; cursor: pointer; font-weight: 700;" onclick="closeDrawerSizes()">✕</div>
        </div>
        <div class="sizes-scroll-row" id="drawerSizesGridContainer"></div>
        <button class="btn-checkout-confirm" onclick="addProductToCartArray()">Добавить в заказ</button>
    </div>

    <div class="bottom-navbar-elite">
        <button class="tab-btn active" onclick="changeActivePage('catalog', this)">
            <div class="tab-icon">🏠</div><div>Витрина</div>
        </button>
        <button class="tab-btn" onclick="changeActivePage('cart', this)">
            <div class="tab-icon">🛒</div><div>Корзина</div>
            <div class="cart-badge-num" id="globalCartCounter" style="display: none;">0</div>
        </button>
    </div>

    <script>
        const telegramApp = window.Telegram.WebApp;
        if(telegramApp && telegramApp.ready) telegramApp.ready();
        if(telegramApp) telegramApp.expand();

        // Премиальная база товаров
        const databaseItems = [
            {"id": 1, "category": "shoes", "title": "Nike Dunk Low Retro", "price": 9200, "oldPrice": 16500, "type": "in_stock", "sizes": ["41", "42", "42.5", "43", "44"], "img": "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=600&q=80"},
            {"id": 2, "category": "clothes", "title": "Куртка TNF Baltoro Black", "price": 14500, "oldPrice": 28000, "type": "on_order", "sizes": ["S", "M", "L", "XL"], "img": "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600&q=80"},
            {"id": 3, "category": "accessories", "title": "Кепка Corteiz Club Cap", "price": 2400, "oldPrice": 5500, "type": "in_stock", "sizes": ["One Size"], "img": "https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=600&q=80"}
        ];

        let filteredItemsList = [...databaseItems];
        let cartStateArray = [];
        let itemSelectionContext = null;
        let sizeSelectionContext = null;

        // Динамическое изменение подсказок под выбранный тип логистики
        function toggleAddressPlaceholder() {
            const delivery = document.getElementById('selectDeliveryType').value;
            const addressInput = document.getElementById('inputAddress');
            
            if (delivery === 'cdek') addressInput.placeholder = "Укажите город и адрес отделения СДЭК";
            else if (delivery === 'post') addressInput.placeholder = "Укажите полный почтовый адрес, индекс, область";
            else if (delivery === 'yandex') addressInput.placeholder = "Укажите город, улицу, дом, корпус и квартиру";
            else if (delivery === 'pickup') addressInput.placeholder = "Пункт выдачи: ул. Афросиаб (Ташкент). Нажмите Оформить";
        }

        function changeActivePage(screenId, element) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            element.classList.add('active');
            document.getElementById(`screen-${screenId}`).classList.add('active');
            if(screenId === 'cart') renderCartView();
        }

        function switchCategoryFilter(category, element) {
            document.querySelectorAll('.cat-node').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
            if(category === 'all') filteredItemsList = [...databaseItems];
            else filteredItemsList = databaseItems.filter(item => item.category === category);
            buildSliderDOM();
        }

        function buildSliderDOM() {
            const track = document.getElementById('sliderItemsTrack');
            track.innerHTML = '';
            if(filteredItemsList.length === 0) {
                track.innerHTML = '<div style="width:100vw; text-align:center; padding:60px 0; color:#636366; font-size:15px; font-weight:600;">Скоро поступление товаров</div>';
                return;
            }
            filteredItemsList.forEach(item => {
                const isStock = item.type === 'in_stock';
                track.innerHTML += `
                    <div class="slide-card-elite">
                        <span class="logistic-tag ${isStock ? 'stock' : 'china'}">${isStock ? 'В наличии' : 'Из Китая'}</span>
                        <div class="image-container"><img src="${item.img}"></div>
                        <div class="product-main-title">${item.title}</div>
                        <div class="product-sizes-subtitle">Доступные размеры: ${item.sizes.join(', ')}</div>
                        <div class="footer-action-row">
                            <div class="price-zone">
                                <span class="old-price-line">${item.oldPrice.toLocaleString()} ₽</span>
                                <span class="current-price">${item.price.toLocaleString()} ₽</span>
                            </div>
                            <button class="action-circle-btn" onclick="openDrawerSizes(${item.id})">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function openDrawerSizes(id) {
            itemSelectionContext = databaseItems.find(p => p.id === id);
            sizeSelectionContext = null;
            document.getElementById('drawerProductName').innerText = itemSelectionContext.title;
            const grid = document.getElementById('drawerSizesGridContainer');
            grid.innerHTML = '';
            itemSelectionContext.sizes.forEach(sz => {
                grid.innerHTML += `<div class="size-item-btn" onclick="selectDrawerSizeElement('${sz}', this)">${sz}</div>`;
            });
            document.getElementById('drawerBlurOverlay').classList.add('open');
            document.getElementById('drawerSizesPanel').classList.add('open');
        }

        function closeDrawerSizes() { 
            document.getElementById('drawerBlurOverlay').classList.remove('open'); 
            document.getElementById('drawerSizesPanel').classList.remove('open'); 
        }

        function selectDrawerSizeElement(size, el) { 
            document.querySelectorAll('.size-item-btn').forEach(b => b.classList.remove('selected')); 
            el.classList.add('selected'); 
            sizeSelectionContext = size; 
        }

        function addProductToCartArray() {
            if(!sizeSelectionContext) { alert('Пожалуйста, выберите размер!'); return; }
            cartStateArray.push({
                cartUid: Date.now() + Math.random(),
                title: itemSelectionContext.title,
                price: itemSelectionContext.price,
                size: sizeSelectionContext,
                img: itemSelectionContext.img
            });
            updateGlobalCounterBadge();
            closeDrawerSizes();
        }

        function updateGlobalCounterBadge() {
            const b = document.getElementById('globalCartCounter');
            if(cartStateArray.length > 0) { b.style.display = 'block'; b.innerText = cartStateArray.length; }
            else b.style.display = 'none';
        }

        function renderCartView() {
            const container = document.getElementById('cartContainerStack');
            const totalLabel = document.getElementById('cartTotalSumText');
            container.innerHTML = '';
            if(cartStateArray.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#636366; padding:60px 0; font-size:15px; font-weight:600;">Ваша корзина пуста</p>';
                document.getElementById('formContainerInputsBlock').style.display = 'none';
                totalLabel.innerText = '0 ₽';
                return;
            }
            document.getElementById('formContainerInputsBlock').style.display = 'block';
            let totalPriceSum = 0;
            cartStateArray.forEach(item => {
                totalPriceSum += item.price;
                container.innerHTML += `
                    <div class="cart-row-item">
                        <div class="cart-row-img"><img src="${item.img}"></div>
                        <div class="cart-row-info"><h4>${item.title}</h4><p>Размер: ${item.size}</p></div>
                        <div class="cart-row-price">${item.price.toLocaleString()} ₽</div>
                        <button class="cart-row-delete" onclick="removeCartItemByUid(${item.cartUid})">✕</button>
                    </div>
                `;
            });
            totalLabel.innerText = `${totalPriceSum.toLocaleString()} ₽`;
        }

        function removeCartItemByUid(cartUid) {
            cartStateArray = cartStateArray.filter(c => c.cartUid !== cartUid);
            updateGlobalCounterBadge();
            renderCartView();
        }

        function sendOrderDataToTelegram() {
            const name = document.getElementById('inputFullname').value.trim();
            const phone = document.getElementById('inputPhone').value.trim();
            const address = document.getElementById('inputAddress').value.trim();
            const deliverySelect = document.getElementById('selectDeliveryType');
            const deliveryText = deliverySelect.options[deliverySelect.selectedIndex].text;

            if(cartStateArray.length === 0 || !name || !phone || (!address && deliverySelect.value !== 'pickup')) { 
                alert('Пожалуйста, заполните обязательные поля!'); 
                return; 
            }
            
            let textSummary = cartStateArray.map(item => `• ${item.title} (Размер: ${item.size}) — ${item.price} ₽`);
            let total = cartStateArray.reduce((sum, item) => sum + item.price, 0);

            const payload = { 
                customer_name: name, 
                customer_phone: phone, 
                delivery_type: deliveryText,
                customer_address: address || "Самовывоз",
                items: textSummary.join('\n'), 
                total: total 
            };

            if(telegramApp && telegramApp.sendData) { 
                telegramApp.sendData(JSON.stringify(payload)); 
                telegramApp.close(); 
            }
        }

        buildSliderDOM();
    </script>
</body>
</html>
