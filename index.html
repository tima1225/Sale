<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>China Express Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;700&display=swap');
        
        * { 
            box-sizing: border-box; 
            font-family: "Century Gothic", "Apple Gothic", "Gothic A1", sans-serif; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: #000000; 
            color: #ffffff; 
            padding: 20px 16px calc(90px + env(safe-area-inset-bottom)) 16px; 
            overflow-x: hidden; 
        }

        /* Стиль заголовка в стиле Apple Store */
        .header-premium { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 24px; 
        }
        .header-premium h1 { 
            font-size: 24px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        /* Категории POIZON Style */
        .categories-slider { 
            display: flex; 
            gap: 16px; 
            overflow-x: auto; 
            margin-bottom: 28px; 
            padding-bottom: 4px; 
        }
        .categories-slider::-webkit-scrollbar { display: none; }
        .cat-node { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-width: 68px; 
            cursor: pointer; 
        }
        .cat-circle { 
            width: 62px; 
            height: 62px; 
            background: #111112; 
            border: 1px solid #1c1c1e; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            margin-bottom: 8px; 
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        .cat-node.active .cat-circle { 
            background: #ffffff; 
            border-color: #ffffff; 
            transform: scale(1.05); 
            box-shadow: 0 8px 24px rgba(255,255,255,0.15); 
        }
        .cat-node.active span { color: #ffffff; font-weight: 700; }
        .cat-node span { font-size: 11px; color: #86868b; text-align: center; }

        /* Премиум Слайдер Товаров */
        .slider-section-container { position: relative; margin-bottom: 30px; width: 100%; }
        .slider-viewport { width: 100%; overflow: hidden; border-radius: 24px; }
        .slider-track { display: flex; transition: transform 0.45s cubic-bezier(0.25, 1, 0.5, 1); will-change: transform; }
        
        /* Карточка товара как в Apple Store */
        .slide-card-elite { 
            min-width: 100%; 
            background: #111112; 
            border: 1px solid #1c1c1e; 
            border-radius: 24px; 
            padding: 20px; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
        }
        .logistic-tag { 
            position: absolute; 
            top: 24px; 
            left: 24px; 
            padding: 6px 14px; 
            border-radius: 30px; 
            font-size: 10px; 
            font-weight: 700; 
            text-transform: uppercase; 
            z-index: 2; 
            letter-spacing: 0.5px; 
        }
        .logistic-tag.stock { background: rgba(52,199,89,0.15); color: #34c759; border: 1px solid rgba(52,199,89,0.3); }
        .logistic-tag.china { background: rgba(255,149,0,0.15); color: #ff9500; border: 1px solid rgba(255,149,0,0.3); }
        
        .image-container { 
            width: 100%; 
            height: 260px; 
            background: #1c1c1e; 
            border-radius: 18px; 
            overflow: hidden; 
            margin-bottom: 20px; 
        }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .product-main-title { font-size: 20px; font-weight: 700; color: #ffffff; margin-bottom: 6px; }
        .product-sizes-subtitle { font-size: 13px; color: #86868b; margin-bottom: 20px; }
        
        .footer-action-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price-zone { display: flex; flex-direction: column; }
        .old-price-line { font-size: 13px; color: #ff453a; text-decoration: line-through; margin-bottom: 2px; }
        .current-price { font-size: 22px; font-weight: 700; color: #ffffff; }
        
        /* Кнопка Плюсик */
        .action-circle-btn { 
            background: #ffffff; 
            color: #000000; 
            border: none; 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            font-size: 24px; 
            font-weight: 500; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.2s;
        }
        .action-circle-btn:active { transform: scale(0.9); }

        /* Управление экранами */
        .app-screen { display: none; } 
        .app-screen.active { display: block; }

        /* Корзина */
        .cart-row-item { 
            display: flex; 
            gap: 14px; 
            background: #111112; 
            border: 1px solid #1c1c1e; 
            padding: 16px; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            align-items: center; 
        }
        .cart-row-img { width: 70px; height: 70px; background: #1c1c1e; border-radius: 12px; overflow: hidden; }
        .cart-row-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-row-info { flex: 1; } 
        .cart-row-info h4 { font-size: 15px; font-weight: 700; color: #fff; } 
        .cart-row-info p { font-size: 12px; color: #86868b; margin-top: 4px; }
        .cart-row-price { font-size: 16px; font-weight: 700; color: #ffffff; margin-right: 8px;}
        .cart-row-delete { background: transparent; border: none; color: #ff453a; font-size: 18px; cursor: pointer; padding: 8px; }

        /* Форма заказа с Выпадающим списком */
        .form-premium-inputs { background: #111112; border: 1px solid #1c1c1e; border-radius: 24px; padding: 20px; margin-top: 24px; }
        .form-premium-inputs h3 { font-size: 11px; text-transform: uppercase; margin-bottom: 16px; color: #86868b; letter-spacing: 1px; }
        .input-holder { margin-bottom: 14px; }
        .input-holder input, .input-holder select { 
            width: 100%; 
            background: #1c1c1e; 
            border: 1px solid #2c2c2e; 
            border-radius: 14px; 
            padding: 16px; 
            color: #fff; 
            font-size: 15px; 
            outline: none;
            appearance: none; /* Убираем стрелочку у select для кастомного вида */
        }
        .input-holder select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='white'><path d='M8 10l-4-4h8z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
        }

        .bill-total-row { display: flex; justify-content: space-between; align-items: center; padding: 24px 4px; font-size: 16px; font-weight: 700; }
        .btn-checkout-confirm { width: 100%; background: #ffffff; color: #000000; border: none; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }

        /* Выезжающая шторка параметров */
        .blur-overlay { position: fixed; top: 0; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .blur-overlay.open { opacity: 1; pointer-events: auto; }
        .drawer-sizes { position: fixed; bottom: 0; left: 0; right: 0; background: #0b0b0c; border-top: 1px solid #1c1c1e; border-top-left-radius: 28px; border-top-right-radius: 28px; padding: 24px 16px calc(24px + env(safe-area-inset-bottom)) 16px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 1000; }
        .drawer-sizes.open { transform: translateY(0); }
        .drawer-bar { width: 40px; height: 5px; background: #2c2c2e; border-radius: 3px; margin: -12px auto 20px auto; }
        .drawer-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .drawer-header-row h3 { font-size: 18px; font-weight: 700; }
        
        .sizes-scroll-row { display: flex; gap: 12px; margin: 16px 0 24px 0; overflow-x: auto; padding-bottom: 6px; }
        .sizes-scroll-row::-webkit-scrollbar { display: none; }
        .size-item-btn { background: #111112; border: 1px solid #1c1c1e; padding: 14px 24px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; color: #fff; transition: all 0.2s; }
        .size-item-btn.selected { background: #ffffff; color: #000000; border-color: #ffffff; box-shadow: 0 4px 16px rgba(255,255,255,0.2); }

        /* Нижний Навбар */
        .bottom-navbar-elite { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(11, 11, 12, 0.85); backdrop-filter: blur(20px); border-top: 1px solid #1c1c1e; display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); z-index: 998; }
        .tab-btn { background: transparent; border: none; color: #86868b; font-size: 11px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; position: relative; }
        .tab-btn.active { color: #ffffff; font-weight: 700; }
        .tab-icon { font-size: 22px; margin-bottom: 4px; }
        .cart-badge-num { position: absolute; top: -3px; right: 6px; background: #ffffff; color: #000000; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="screen-catalog" class="app-screen active">
        <div class="header-premium">
            <h1>CHINA EXPRESS</h1>
        </div>

        <div class="categories-slider">
            <div class="cat-node active" onclick="switchCategoryFilter('all', this)">
                <div class="cat-circle">🔥</div><span>Все</span>
            </div>
            <div class="cat-node" onclick="switchCategoryFilter('shoes', this)">
                <div class="cat-circle">👟</div><span>Обувь</span>
            </div>
            <div class="cat-node" onclick="switchCategoryFilter('clothes', this)">
                <div class="cat-circle"> Jacket</div><span>Одежда</span>
            </div>
            <div class="cat-node" onclick="switchCategoryFilter('accessories', this)">
                <div class="cat-circle">🧢</div><span>Аксессуары</span>
            </div>
        </div>

        <div class="slider-section-container">
            <div class="slider-viewport" id="sliderViewportContainer">
                <div class="slider-track" id="sliderItemsTrack"></div>
            </div>
        </div>
    </div>

    <div id="screen-cart" class="app-screen">
        <h2 style="font-size: 22px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;">Корзина</h2>
        <div class="cart-stack" id="cartContainerStack"></div>
        
        <div class="form-premium-inputs" id="formContainerInputsBlock">
            <h3>Данные для доставки заказа</h3>
            <div class="input-holder">
                <input type="text" id="inputFullname" placeholder="ФИО получателя полностью">
            </div>
            <div class="input-holder">
                <input type="tel" id="inputPhone" placeholder="Номер телефона">
            </div>
            
            <div class="input-holder">
                <select id="selectDeliveryType" onchange="toggleAddressPlaceholder()">
                    <option value="cdek">Доставка до ПВЗ СДЭК</option>
                    <option value="post">Почта России</option>
                    <option value="yandex">Курьер (Яндекс.Доставка)</option>
                    <option value="pickup">Самовывоз (Ташкент)</option>
                </select>
            </div>
            
            <div class="input-holder">
                <input type="text" id="inputAddress" placeholder="Укажите город и адрес отделения СДЭК">
            </div>
        </div>
        
        <div class="bill-total-row">
            <span style="color: #86868b; font-weight: 500;">ИТОГО К ОПЛАТЕ:</span>
            <span style="color: #34c759; font-size: 24px;" id="cartTotalSumText">0 ₽</span>
        </div>
        <button class="btn-checkout-confirm" onclick="sendOrderDataToTelegram()">Оформить заказ</button>
    </div>

    <div class="blur-overlay" id="drawerBlurOverlay" onclick="closeDrawerSizes()"></div>
    <div class="drawer-sizes" id="drawerSizesPanel">
        <div class="drawer-bar"></div>
        <div class="drawer-header-row">
            <h3 id="drawerProductName">Выберите размер</h3>
            <div style="color: #86868b; font-size: 22px; cursor: pointer;" onclick="closeDrawerSizes()">✕</div>
        </div>
        <div class="sizes-scroll-row" id="drawerSizesGridContainer"></div>
        <button class="btn-checkout-confirm" onclick="addProductToCartArray()">Добавить в корзину</button>
    </div>

    <div class="bottom-navbar-elite">
        <button class="tab-btn active" onclick="changeActivePage('catalog', this)">
            <div class="tab-icon">🏠</div><div>Магазин</div>
        </button>
        <button class="tab-btn" onclick="changeActivePage('cart', this)">
            <div class="tab-icon">🛒</div><div>Корзина</div>
            <div class="cart-badge-num" id="globalCartCounter" style="display: none;">0</div>
        </button>
    </div>

    <script>
        const telegramApp = window.Telegram.WebApp;
        if(telegramApp) telegramApp.expand();

        // База товаров (Вшита прямо в код для моментальной работы)
        const databaseItems = [
            {"id": 1, "category": "shoes", "title": "Nike Dunk Low Retro", "price": 9200, "oldPrice": 16500, "type": "in_stock", "sizes": ["41", "42", "43", "44"], "img": "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=600&q=80"},
            {"id": 2, "category": "clothes", "title": "Куртка TNF Baltoro Black", "price": 14500, "oldPrice": 28000, "type": "on_order", "sizes": ["S", "M", "L", "XL"], "img": "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600&q=80"},
            {"id": 3, "category": "accessories", "title": "Кепка Corteiz Club Cap", "price": 2400, "oldPrice": 5500, "type": "in_stock", "sizes": ["One Size"], "img": "https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=600&q=80"}
        ];

        let filteredItemsList = [...databaseItems];
        let cartStateArray = [];
        let itemSelectionContext = null;
        let sizeSelectionContext = null;

        // Смена плейсхолдера при выборе типа доставки
        function toggleAddressPlaceholder() {
            const delivery = document.getElementById('selectDeliveryType').value;
            const addressInput = document.getElementById('inputAddress');
            if (delivery === 'cdek') addressInput.placeholder = "Укажите город и адрес отделения СДЭК";
            else if (delivery === 'post') addressInput.placeholder = "Укажите ваш полный почтовый адрес и индекс";
            else if (delivery === 'yandex') addressInput.placeholder = "Укажите город, улицу, дом и квартиру для курьера";
            else if (delivery === 'pickup') addressInput.placeholder = "Пункт выдачи: ул. Афросиаб, Ташкент (нажмите Оформить)";
        }

        function changeActivePage(screenId, element) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            element.classList.add('active');
            document.getElementById(`screen-${screenId}`).classList.add('active');
            if(screenId === 'cart') renderCartView();
        }

        function switchCategoryFilter(category, element) {
            document.querySelectorAll('.cat-node').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
            if(category === 'all') filteredItemsList = [...databaseItems];
            else filteredItemsList = databaseItems.filter(item => item.category === category);
            buildSliderDOM();
        }

        function buildSliderDOM() {
            const track = document.getElementById('sliderItemsTrack');
            track.innerHTML = '';
            if(filteredItemsList.length === 0) {
                track.innerHTML = '<div style="width:100%; text-align:center; padding:40px; color:#444;">Нет товаров</div>';
                return;
            }
            filteredItemsList.forEach(item => {
                const isStock = item.type === 'in_stock';
                track.innerHTML += `
                    <div class="slide-card-elite" style="margin-right: 16px;">
                        <span class="logistic-tag ${isStock ? 'stock' : 'china'}">${isStock ? 'В наличии' : 'Из Китая'}</span>
                        <div class="image-container"><img src="${item.img}"></div>
                        <div class="product-main-title">${item.title}</div>
                        <div class="product-sizes-subtitle">Доступные размеры: ${item.sizes.join(', ')}</div>
                        <div class="footer-action-row">
                            <div class="price-zone">
                                <span class="old-price-line">${item.oldPrice.toLocaleString()} ₽</span>
                                <span class="current-price">${item.price.toLocaleString()} ₽</span>
                            </div>
                            <button class="action-circle-btn" onclick="openDrawerSizes(${item.id})">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function openDrawerSizes(id) {
            itemSelectionContext = databaseItems.find(p => p.id === id);
            sizeSelectionContext = null;
            document.getElementById('drawerProductName').innerText = itemSelectionContext.title;
            const grid = document.getElementById('drawerSizesGridContainer');
            grid.innerHTML = '';
            itemSelectionContext.sizes.forEach(sz => {
                grid.innerHTML += `<div class="size-item-btn" onclick="selectDrawerSizeElement('${sz}', this)">${sz}</div>`;
            });
            document.getElementById('drawerBlurOverlay').classList.add('open');
            document.getElementById('drawerSizesPanel').classList.add('open');
        }

        function closeDrawerSizes() { 
            document.getElementById('drawerBlurOverlay').classList.remove('open'); 
            document.getElementById('drawerSizesPanel').classList.remove('open'); 
        }

        function selectDrawerSizeElement(size, el) { 
            document.querySelectorAll('.size-item-btn').forEach(b => b.classList.remove('selected')); 
            el.classList.add('selected'); 
            sizeSelectionContext = size; 
        }

        function addProductToCartArray() {
            if(!sizeSelectionContext) { alert('Укажите нужный размер!'); return; }
            cartStateArray.push({
                cartUid: Date.now() + Math.random(),
                title: itemSelectionContext.title,
                price: itemSelectionContext.price,
                size: sizeSelectionContext,
                img: itemSelectionContext.img
            });
            updateGlobalCounterBadge();
            closeDrawerSizes();
        }

        function updateGlobalCounterBadge() {
            const b = document.getElementById('globalCartCounter');
            if(cartStateArray.length > 0) { b.style.display = 'block'; b.innerText = cartStateArray.length; }
            else b.style.display = 'none';
        }

        function renderCartView() {
            const container = document.getElementById('cartContainerStack');
            const totalLabel = document.getElementById('cartTotalSumText');
            container.innerHTML = '';
            if(cartStateArray.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#86868b; padding:40px 0; font-size:14px;">Ваша корзина пока пуста</p>';
                document.getElementById('formContainerInputsBlock').style.display = 'none';
                totalLabel.innerText = '0 ₽';
                return;
            }
            document.getElementById('formContainerInputsBlock').style.display = 'block';
            let totalPriceSum = 0;
            cartStateArray.forEach(item => {
                totalPriceSum += item.price;
                container.innerHTML += `
                    <div class="cart-row-item">
                        <div class="cart-row-img"><img src="${item.img}"></div>
                        <div class="cart-row-info"><h4>${item.title}</h4><p>Размер: ${item.size}</p></div>
                        <div class="cart-row-price">${item.price.toLocaleString()} ₽</div>
                        <button class="cart-row-delete" onclick="removeCartItemByUid(${item.cartUid})">✕</button>
                    </div>
                `;
            });
            totalLabel.innerText = `${totalPriceSum.toLocaleString()} ₽`;
        }

        function removeCartItemByUid(cartUid) {
            cartStateArray = cartStateArray.filter(c => c.cartUid !== cartUid);
            updateGlobalCounterBadge();
            renderCartView();
        }

        // Отправка готовых структурированных данных обратно в Telegram-чат
        function sendOrderDataToTelegram() {
            const name = document.getElementById('inputFullname').value.trim();
            const phone = document.getElementById('inputPhone').value.trim();
            const address = document.getElementById('inputAddress').value.trim();
            const deliverySelect = document.getElementById('selectDeliveryType');
            const deliveryText = deliverySelect.options[deliverySelect.selectedIndex].text;

            if(cartStateArray.length === 0 || !name || !phone || (!address && deliverySelect.value !== 'pickup')) { 
                alert('Пожалуйста, заполните все поля!'); 
                return; 
            }
            
            let textSummary = cartStateArray.map(item => `• ${item.title} (Размер: ${item.size}) — ${item.price} ₽`);
            let total = cartStateArray.reduce((sum, item) => sum + item.price, 0);

            const payload = { 
                customer_name: name, 
                customer_phone: phone, 
                delivery_type: deliveryText,
                customer_address: address || "Самовывоз",
                items: textSummary.join('\n'), 
                total: total 
            };

            if(telegramApp && telegramApp.sendData) { 
                telegramApp.sendData(JSON.stringify(payload)); 
                telegramApp.close(); 
            }
        }

        buildSliderDOM();
        
        // Добавляем поддержку свайпов пальцем для мобильных маркетплейсов
        let startX = 0;
        const view = document.getElementById('sliderViewportContainer');
        view.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        view.addEventListener('touchend', e => {
            let diffX = startX - e.changedTouches[0].clientX;
            let track = document.getElementById('sliderItemsTrack');
            // Эмуляция бесконечного мобильного скролла
            if (Math.abs(diffX) > 50) {
                if (diffX > 0) view.scrollBy({ left: 280, behavior: 'smooth' });
                else view.scrollBy({ left: -280, behavior: 'smooth' });
            }
        });
    </script>
</body>
</html>
