<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIA Enterprise Engine</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/brigends-king');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        :root { --bg: #060709; --accent: #00d2ff; --text: #fff; --card: #0d0f16; --danger: #ef4444; --success: #10b981; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding-bottom: 100px; }
        .screen { display: none; padding: 20px; }
        .screen.active { display: block; }
        .brand { font-family: 'Brigends King', sans-serif; font-size: 40px; text-align: center; margin: 30px 0; }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; background: #151822; border: 1px solid #333; border-radius: 10px; color: white; }
        button { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-family: 'Brigends King', sans-serif; color: #000; }
        .admin-card { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: none; padding: 15px; justify-content: space-around; border-top: 1px solid #333; z-index: 1000; }
        .nav-btn { cursor: pointer; font-family: 'Brigends King', sans-serif; }
    </style>
</head>
<body>

<div id="screen-auth" class="screen active">
    <h1 class="brand">TIA</h1>
    <div id="reg-fields" style="display:none;">
        <input type="text" id="reg-name" class="input-box" placeholder="Ваше Имя">
        <input type="password" id="reg-pass" class="input-box" placeholder="Пароль">
        <input type="password" id="reg-pass-2" class="input-box" placeholder="Повторите пароль">
        <button onclick="app.register()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>
    <div id="login-fields">
        <input type="text" id="login-id" class="input-box" placeholder="ID (TIA-XXXXX)">
        <input type="password" id="login-pass" class="input-box" placeholder="Пароль">
        <button onclick="app.login()">ВОЙТИ</button>
    </div>
    <button style="background:none; color:gray;" onclick="app.toggleAuth()">Регистрация / Вход</button>
    <button style="background:none; color:var(--danger);" onclick="app.adminLogin()">Вход для Админа</button>
</div>

<div id="screen-feed" class="screen"><h2 class="brand">ЛЕНТА</h2><div id="feed"></div></div>
<div id="screen-admin" class="screen"><h2 class="brand" style="color:red;">АДМИН</h2><div id="admin-view"></div></div>

<div id="nav-bar" class="nav-bar">
    <div class="nav-btn" onclick="app.go('screen-feed')">ЛЕНТА</div>
    <div class="nav-btn" onclick="app.go('screen-admin')">АДМИН</div>
    <div class="nav-btn" onclick="app.logout()">ВЫХОД</div>
</div>

<script>
    window.app = {
        users: JSON.parse(localStorage.getItem('tia_users') || '{}'),
        isRegMode: false,

        toggleAuth: function() {
            this.isRegMode = !this.isRegMode;
            document.getElementById('reg-fields').style.display = this.isRegMode ? 'block' : 'none';
            document.getElementById('login-fields').style.display = this.isRegMode ? 'none' : 'block';
        },

        register: function() {
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            const pass2 = document.getElementById('reg-pass-2').value;
            if(pass !== pass2) return alert("Пароли не совпадают!");
            const id = "TIA-" + Math.floor(Math.random()*90000+10000);
            this.users[id] = { name, pass };
            localStorage.setItem('tia_users', JSON.stringify(this.users));
            alert("Успешно! Ваш ID: " + id);
        },

        login: function() {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            if(this.users[id] && this.users[id].pass === pass) {
                localStorage.setItem('session', id);
                this.go('screen-feed');
                document.getElementById('nav-bar').style.display = 'flex';
                document.getElementById('screen-auth').classList.remove('active');
            } else { alert("Ошибка доступа"); }
        },

        adminLogin: function() {
            if(prompt("Пароль админа:") === "admin") {
                this.go('screen-admin');
                document.getElementById('nav-bar').style.display = 'flex';
                document.getElementById('screen-auth').classList.remove('active');
            }
        },

        renderAdmin: function() {
            const view = document.getElementById('admin-view');
            view.innerHTML = "";
            Object.entries(this.users).forEach(([id, data]) => {
                const div = document.createElement('div');
                div.className = 'admin-card';
                div.innerHTML = `<p>ID: ${id} | Имя: ${data.name}</p>
                                 <button style="background:var(--danger)" onclick="app.deleteUser('${id}')">УДАЛИТЬ</button>`;
                view.appendChild(div);
            });
        },

        deleteUser: function(id) {
            delete this.users[id];
            localStorage.setItem('tia_users', JSON.stringify(this.users));
            this.renderAdmin();
        },

        go: function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-admin') this.renderAdmin();
        },

        logout: function() {
            localStorage.removeItem('session');
            location.reload();
        }
    };
</script>
</body>
</html>
