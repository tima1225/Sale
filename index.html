<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TIA - Вход</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #060709; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .box { width: 300px; padding: 20px; background: #0d0f16; border-radius: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #151822; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00d2ff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <h2 style="text-align:center;">TIA ВХОД</h2>
    <input type="text" id="id" placeholder="ID (например: TIA-00000)">
    <input type="password" id="pass" placeholder="Пароль">
    <button onclick="login()">ВОЙТИ</button>
</div>

<script>
    // ВСТАВЬТЕ СЮДА ВАШИ ДАННЫЕ
    const supabase = supabase.createClient('ВАШ_PROJECT_URL', 'ВАШ_ANON_KEY');

    async function login() {
        const id = document.getElementById('id').value;
        const pass = document.getElementById('pass').value;

        const { data, error } = await supabase
            .from('users')
            .select('*')
            .eq('id', id)
            .eq('password_hash', pass)
            .single();

        if (data) {
            localStorage.setItem('user_session', JSON.stringify(data));
            window.location.href = 'app.html';
        } else {
            alert("Ошибка: Неверный ID или пароль");
        }
    }
</script>
</body>
</html>
