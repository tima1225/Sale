<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIA - Secure Enterprise Marketplace</title>
    <!-- Подключение ваших шрифтов -->
    <style>
        @import url('https://fonts.cdnfonts.com/css/brigends-king');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        
        :root { --bg: #060709; --accent: #00d2ff; --card: #0d0f16; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; }
        
        /* Ваш фирменный дизайн */
        .brand { font-family: 'Brigends King', sans-serif; letter-spacing: 2px; text-align: center; font-size: 50px; margin: 40px 0; }
        .card-box { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; background: #151822; border: 1px solid #333; border-radius: 10px; color: white; }
        button { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Brigends King', sans-serif; margin-top: 10px; }
        
        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body>

<div id="scr-auth" class="screen active">
    <h1 class="brand">TIA</h1>
    <div class="card-box">
        <input type="text" id="login-id" class="input-box" placeholder="Ваш ID (TIA-XXXXX)">
        <input type="password" id="login-pass" class="input-box" placeholder="Пароль">
        <button onclick="app.login()">ВОЙТИ В СИСТЕМУ</button>
    </div>
</div>

<div id="scr-main" class="screen">
    <h1 class="brand" style="font-size: 30px;">ЛЕНТА</h1>
    <div id="feed"></div>
</div>

<script>
    const app = {
        login: function() {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            const users = JSON.parse(localStorage.getItem('tia_users') || '{}');
            
            if(users[id] && users[id].pass === pass) {
                localStorage.setItem('session', id);
                document.getElementById('scr-auth').classList.remove('active');
                document.getElementById('scr-main').classList.add('active');
            } else {
                alert("Ошибка доступа. Проверьте ID и пароль.");
            }
        }
    };
</script>
</body>
</html>
